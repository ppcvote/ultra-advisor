<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>離線中 - Ultra Advisor</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
      opacity: 0.8;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #f1f5f9;
    }

    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      font-size: 0.875rem;
    }

    .status-label {
      color: #94a3b8;
    }

    .status-value {
      color: #f1f5f9;
      font-weight: 500;
    }

    .status-value.online {
      color: #10b981;
    }

    .status-value.offline {
      color: #f59e0b;
    }

    .tips {
      margin-top: 2rem;
      text-align: left;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 0.75rem;
      padding: 1rem;
    }

    .tips h3 {
      font-size: 0.875rem;
      color: #60a5fa;
      margin-bottom: 0.75rem;
    }

    .tips ul {
      list-style: none;
      font-size: 0.813rem;
      color: #94a3b8;
    }

    .tips li {
      padding: 0.25rem 0;
      padding-left: 1.25rem;
      position: relative;
    }

    .tips li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: #60a5fa;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .pulse {
      animation: pulse 2s infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.png" alt="Ultra Advisor" class="logo">

    <div class="icon pulse">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>

    <h1>目前離線中</h1>
    <p>看起來你的網路連線暫時中斷了。請確認網路狀態後再試一次。</p>

    <button class="retry-btn" onclick="location.reload()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"></path>
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
        <path d="M3 22v-6h6"></path>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
      </svg>
      重新連線
    </button>

    <div class="status">
      <div class="status-item">
        <span class="status-label">網路狀態</span>
        <span class="status-value" id="networkStatus">檢查中...</span>
      </div>
      <div class="status-item">
        <span class="status-label">快取版本</span>
        <span class="status-value">v1</span>
      </div>
    </div>

    <div class="tips">
      <h3>小提示</h3>
      <ul>
        <li>檢查 Wi-Fi 或行動數據是否已開啟</li>
        <li>嘗試切換到其他網路</li>
        <li>重新啟動應用程式</li>
        <li>如持續無法連線，請稍後再試</li>
      </ul>
    </div>
  </div>

  <script>
    // 監測網路狀態
    function updateNetworkStatus() {
      const statusEl = document.getElementById('networkStatus');
      if (navigator.onLine) {
        statusEl.textContent = '已連線';
        statusEl.className = 'status-value online';
        // 如果恢復連線，自動重整
        setTimeout(() => location.reload(), 1000);
      } else {
        statusEl.textContent = '離線';
        statusEl.className = 'status-value offline';
      }
    }

    // 初始檢查
    updateNetworkStatus();

    // 監聽網路狀態變化
    window.addEventListener('online', updateNetworkStatus);
    window.addEventListener('offline', updateNetworkStatus);
  </script>
</body>
</html>
