<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景漸層 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0f1a"/>
      <stop offset="50%" stop-color="#151929"/>
      <stop offset="100%" stop-color="#0c0f1a"/>
    </linearGradient>
    <!-- Logo 左筆畫（藍） -->
    <linearGradient id="stroke-blue" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Logo 右筆畫（紅/紫） -->
    <linearGradient id="stroke-red" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- 橫槓漸層 -->
    <linearGradient id="bar-grad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <!-- 網格線 pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <!-- 角落光暈 -->
    <radialGradient id="glow-tl" cx="0" cy="0" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-br" cx="1200" cy="630" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 網格 -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- 角落光暈 -->
  <rect width="1200" height="630" fill="url(#glow-tl)"/>
  <rect width="1200" height="630" fill="url(#glow-br)"/>

  <!-- ===== 四角裝飾括號 ===== -->
  <!-- 左上 -->
  <path d="M 60 100 L 60 60 L 100 60" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
  <!-- 右上 -->
  <path d="M 1140 100 L 1140 60 L 1100 60" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
  <!-- 左下 -->
  <path d="M 60 530 L 60 570 L 100 570" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
  <!-- 右下 -->
  <path d="M 1140 530 L 1140 570 L 1100 570" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>

  <!-- ===== Logo（居中上方）===== -->
  <g transform="translate(600, 195) scale(0.7)">
    <!-- 左筆畫（藍）— 從左下到右上彎曲 -->
    <path d="M -45 80 C -30 -10, 10 -90, 25 -120" fill="none" stroke="url(#stroke-blue)" stroke-width="10" stroke-linecap="round"/>
    <!-- 右筆畫（紅）— 從右下到左上彎曲 -->
    <path d="M 45 80 C 30 -10, -10 -90, -25 -120" fill="none" stroke="url(#stroke-red)" stroke-width="10" stroke-linecap="round"/>
    <!-- 橫槓 -->
    <rect x="-40" y="42" width="80" height="4" rx="2" fill="url(#bar-grad)" opacity="0.7"/>
  </g>

  <!-- ===== 品牌名稱 ===== -->
  <text x="600" y="340" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="12" fill="white">
    ULTRA ADVISOR
  </text>

  <!-- ===== 英文標語 ===== -->
  <text x="600" y="395" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="24" font-weight="300" letter-spacing="6" fill="#94a3b8">
    Visualize. Plan. Achieve.
  </text>

  <!-- ===== 中文副標 ===== -->
  <text x="600" y="455" text-anchor="middle" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18" font-weight="400" letter-spacing="3" fill="#64748b">
    專業財務視覺化 × 持照顧問打造 × 數據替你說話
  </text>
</svg>
